<!DOCTYPE html>
<html lang="de"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eatly</title>
<link rel="preconnect" href="https://fonts.googleapis.com/">
<link rel="preconnect" href="https://fonts.gstatic.com/" crossorigin="">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.0.0/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#faf7f2;--card:#ffffff;--green:#2c5f3d;--green-light:#e8f2eb;--green-mid:#4a8c60;
  --terra:#d4663a;--terra-light:#faeee7;--gold:#c49a2a;--gold-light:#fdf6e3;
  --text:#1a1a1a;--text2:#6b6b6b;--text3:#a0a0a0;--border:#e8e4dd;--border2:#d4cfc7;
  --shadow:0 1px 3px rgba(0,0,0,.06),0 4px 12px rgba(0,0,0,.04);
  --shadow-lg:0 8px 32px rgba(0,0,0,.10);--r:12px;--r2:18px;--r3:24px;
}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
button{font-family:'Inter',sans-serif;cursor:pointer}
#shell{max-width:440px;margin:0 auto;min-height:100vh;background:var(--bg);position:relative;padding-bottom:80px}
.hdr{background:var(--card);border-bottom:1px solid var(--border);padding:14px 20px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100}
.hdr-logo{font-family:'Playfair Display',serif;font-size:22px;font-weight:700;color:var(--green);letter-spacing:-.3px}
.hdr-logo span{color:var(--terra)}
.hdr-title{font-family:'Playfair Display',serif;font-size:18px;font-weight:500;color:var(--text)}
.hdr-back{background:var(--bg);border:1px solid var(--border);border-radius:50%;width:34px;height:34px;display:flex;align-items:center;justify-content:center;color:var(--text2);flex-shrink:0}
.tabs{background:var(--card);border-bottom:1px solid var(--border);display:flex;position:sticky;top:57px;z-index:99}
.tab{flex:1;background:none;border:none;border-bottom:2px solid transparent;padding:11px 4px 9px;display:flex;flex-direction:column;align-items:center;gap:4px;color:var(--text3);font-size:10px;font-weight:500;letter-spacing:.3px;text-transform:uppercase;transition:color .2s}
.tab.active{color:var(--green);border-bottom-color:var(--green)}
.tab i{font-size:19px}
.filters{padding:16px 16px 8px;display:flex;gap:8px;overflow-x:auto;scrollbar-width:none}
.filters::-webkit-scrollbar{display:none}
.chip{white-space:nowrap;display:inline-flex;align-items:center;gap:5px;padding:7px 14px;border-radius:100px;font-size:12px;font-weight:500;border:1px solid var(--border);background:var(--card);color:var(--text2);transition:all .15s}
.chip.on{background:var(--green);border-color:var(--green);color:#fff}
.chip i{font-size:13px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:8px 16px 20px}
.recipe-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r2);overflow:hidden;text-align:left;box-shadow:var(--shadow);transition:transform .15s}
.recipe-card:active{transform:scale(.97)}
.recipe-card .thumb{width:100%;height:110px;object-fit:cover;display:block;background:var(--bg)}
.recipe-card .thumb-fallback{width:100%;height:110px;display:flex;align-items:center;justify-content:center;font-family:'Playfair Display',serif;font-size:28px;font-weight:700;color:#fff}
.recipe-card .body{padding:11px 12px 13px}
.recipe-card .name{font-family:'Playfair Display',serif;font-size:14px;font-weight:500;color:var(--text);line-height:1.35;margin-bottom:4px}
.recipe-card .meta{font-size:11px;color:var(--text3);display:flex;align-items:center;gap:6px}
.recipe-card .meta i{font-size:12px}
.macro-bar{display:flex;height:3px;border-radius:2px;overflow:hidden;gap:1px;margin-top:8px}
.macro-bar div{border-radius:2px}
.empty{text-align:center;padding:60px 20px;color:var(--text3)}
.empty i{font-size:40px;color:var(--border2)}
.empty h3{font-family:'Playfair Display',serif;font-size:17px;color:var(--text2);margin:12px 0 4px}
.empty p{font-size:13px}
.detail-hero{position:relative;width:100%;height:220px;overflow:hidden;background:var(--green)}
.detail-hero img{width:100%;height:100%;object-fit:cover;display:block}
.detail-hero-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.55) 0%,transparent 55%)}
.detail-hero-text{position:absolute;bottom:0;left:0;right:0;padding:20px}
.detail-hero-text h1{font-family:'Playfair Display',serif;font-size:22px;font-weight:700;color:#fff;line-height:1.2}
.detail-hero-text .meta{color:rgba(255,255,255,.8);font-size:13px;margin-top:4px;display:flex;align-items:center;gap:6px}
.section-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r2);padding:20px;margin:0 16px 12px;box-shadow:var(--shadow)}
.section-title{font-family:'Playfair Display',serif;font-size:15px;font-weight:500;color:var(--text);margin-bottom:14px}
.macro-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.macro-tile{background:var(--bg);border-radius:var(--r);padding:12px 14px}
.macro-tile .lbl{font-size:11px;color:var(--text3);display:flex;align-items:center;gap:4px;margin-bottom:4px}
.macro-tile .val{font-family:'Playfair Display',serif;font-size:22px;font-weight:700;color:var(--text)}
.macro-tile .unit{font-size:12px;font-weight:400;color:var(--text3);margin-left:2px}
.tags-row{display:flex;gap:6px;flex-wrap:wrap;padding:16px 16px 4px}
.tag{font-size:11px;font-weight:500;padding:4px 10px;border-radius:100px;display:inline-flex;align-items:center;gap:4px}
.tag.vegan{background:#e6f4ea;color:#1e6b38}
.tag.vegetarisch{background:#fff3e0;color:#b35c00}
.tag.high-protein{background:#e8eaf6;color:#303f9f}
.tag.low-calorie{background:#fce4ec;color:#880e4f}
.tag.meal-prep{background:#e0f7fa;color:#00616a}
.tag.fruehstueck{background:#fffde7;color:#7b5800}
.zutat-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border);font-size:14px}
.zutat-row:last-child{border-bottom:none}
.zutat-row .n{color:var(--text)}
.zutat-row .m{color:var(--text2);font-weight:500;font-size:13px}
.step{display:flex;gap:14px;margin-bottom:16px;align-items:flex-start}
.step-num{width:28px;height:28px;border-radius:50%;background:var(--green);color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;flex-shrink:0;margin-top:1px}
.step-text{font-size:14px;color:var(--text);line-height:1.6;padding-top:4px}
.track-btn{width:100%;background:var(--green);color:#fff;border:none;border-radius:var(--r);padding:14px;font-weight:600;font-size:14px;display:flex;align-items:center;justify-content:center;gap:8px;transition:background .15s}
.track-btn:active{background:var(--green-mid)}
.picker-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r2);margin-bottom:8px;display:flex;align-items:center;gap:12px;padding:12px 16px;box-shadow:var(--shadow)}
.picker-card .pname{font-weight:500;font-size:14px;color:var(--text)}
.picker-card .psub{font-size:12px;color:var(--text3);margin-top:2px}
.picker-card .padd{color:var(--text3);font-size:18px}
.day-strip{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;padding:16px 16px 12px}
.day-strip::-webkit-scrollbar{display:none}
.day-btn{min-width:44px;padding:8px 6px;border-radius:12px;border:1px solid var(--border);background:var(--card);color:var(--text2);font-size:13px;font-weight:500;display:flex;flex-direction:column;align-items:center;gap:4px;transition:all .15s}
.day-btn.active{background:var(--green);border-color:var(--green);color:#fff}
.day-dots{display:flex;gap:2px}
.day-dot{width:4px;height:4px;border-radius:2px}
.kcal-bar{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:12px 16px;margin:0 16px 12px;display:flex;justify-content:space-between;align-items:center;font-size:13px}
.kcal-bar span{color:var(--text2)}
.kcal-bar strong{color:var(--terra);font-weight:600;font-size:15px}
.meal-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r2);padding:16px;margin:0 16px 10px;box-shadow:var(--shadow)}
.meal-label{font-size:11px;font-weight:600;letter-spacing:.8px;text-transform:uppercase;color:var(--text3);margin-bottom:12px;display:flex;align-items:center;gap:6px}
.meal-label i{font-size:14px}
.meal-filled{display:flex;gap:10px;align-items:center}
.mname{font-weight:500;font-size:14px;color:var(--text)}
.msub{font-size:12px;color:var(--text3);margin-top:2px}
.remove-btn{background:var(--terra-light);border:none;border-radius:8px;padding:6px 8px;color:var(--terra)}
.add-slot{width:100%;background:transparent;border:1.5px dashed var(--border2);border-radius:var(--r);padding:12px;color:var(--text3);font-size:13px;display:flex;align-items:center;justify-content:center;gap:6px;font-weight:500}
.shop-hero{background:var(--green);border-radius:var(--r2);margin:16px 16px 14px;padding:16px 20px;display:flex;justify-content:space-between;align-items:center}
.shop-hero h2{font-family:'Playfair Display',serif;font-size:16px;font-weight:700;color:#fff}
.shop-hero p{font-size:12px;color:rgba(255,255,255,.7);margin-top:2px}
.shop-hero .scount{font-family:'Playfair Display',serif;font-size:30px;font-weight:700;color:#fff}
.shop-hero .scount span{font-size:14px;font-weight:400}
.shop-item{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:12px 16px;margin:0 16px 8px;display:flex;align-items:center;gap:12px;width:calc(100% - 32px);transition:opacity .2s}
.shop-item.done{opacity:.4}
.shop-cb{width:22px;height:22px;border-radius:6px;border:1.5px solid var(--border2);background:transparent;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s}
.shop-cb.cbdone{background:var(--green);border-color:var(--green)}
.shop-cb i{font-size:13px;color:#fff}
.shop-name{flex:1;font-size:14px;color:var(--text);text-align:left}
.shop-name.done{text-decoration:line-through}
.shop-menge{font-size:13px;color:var(--text3);font-weight:500}
.tracker-summary{background:var(--card);border:1px solid var(--border);border-radius:var(--r2);margin:16px 16px 12px;padding:20px;box-shadow:var(--shadow)}
.tracker-summary h2{font-family:'Playfair Display',serif;font-size:16px;font-weight:500;color:var(--text);margin-bottom:14px}
.prog-bar-label{display:flex;justify-content:space-between;font-size:12px;color:var(--text3);margin-bottom:5px}
.prog-bar-track{background:var(--bg);border-radius:4px;height:7px}
.prog-bar-fill{height:100%;border-radius:4px;transition:width .4s ease}
.log-btn{background:var(--card);border:1px solid var(--border);border-radius:var(--r);margin:0 16px 10px;padding:13px 16px;display:flex;align-items:center;justify-content:space-between;width:calc(100% - 32px);box-shadow:var(--shadow)}
.log-btn span{font-weight:500;font-size:14px;color:var(--text);display:flex;align-items:center;gap:8px}
.log-dropdown{background:var(--card);border:1px solid var(--border);border-radius:var(--r2);margin:0 16px 14px;overflow:hidden;box-shadow:var(--shadow-lg)}
.log-row{display:flex;align-items:center;gap:10px;padding:11px 16px;border-bottom:1px solid var(--border);width:100%;background:none;border-left:none;border-right:none;border-top:none;text-align:left}
.log-row:last-child{border-bottom:none}
.lrname{font-weight:500;font-size:13px;color:var(--text)}
.lrsub{font-size:11px;color:var(--text3)}
.logged-section{padding:0 16px}
.logged-section h3{font-family:'Playfair Display',serif;font-size:15px;font-weight:500;color:var(--text);margin-bottom:10px}
.logged-item{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:11px 14px;margin-bottom:8px;display:flex;gap:10px;align-items:center;box-shadow:var(--shadow)}
.liname{font-weight:500;font-size:13px;color:var(--text)}
.lisub{font-size:11px;color:var(--text3);margin-top:1px}
.del-btn{background:none;border:none;color:var(--text3);padding:4px}

/* ── KI MODAL ── */
.ki-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:flex;align-items:flex-end;justify-content:center;animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.ki-sheet{background:var(--card);border-radius:24px 24px 0 0;padding:24px 20px 36px;width:100%;max-width:440px;animation:slideUp .25s ease;max-height:90vh;overflow-y:auto}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.ki-title{font-family:'Playfair Display',serif;font-size:20px;font-weight:700;color:var(--text);margin-bottom:4px}
.ki-sub{font-size:13px;color:var(--text3);margin-bottom:22px}
.ki-label{font-size:11px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;color:var(--text3);margin-bottom:8px;display:block}
.ki-slider{width:100%;margin-bottom:4px;accent-color:var(--green)}
.ki-val{font-family:'Playfair Display',serif;font-size:28px;font-weight:700;color:var(--green);text-align:center;margin-bottom:18px}
.ki-toggles{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:20px}
.ki-tog{padding:7px 14px;border-radius:100px;border:1px solid var(--border);background:var(--card);color:var(--text2);font-size:13px;font-weight:500;cursor:pointer;transition:all .15s;font-family:'Inter',sans-serif}
.ki-tog.on{background:var(--terra);border-color:var(--terra);color:#fff}
.ki-input{width:100%;padding:10px 14px;border:1px solid var(--border);border-radius:var(--r);font-family:'Inter',sans-serif;font-size:14px;color:var(--text);background:var(--bg);outline:none;margin-bottom:20px;box-sizing:border-box}
.ki-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:22px}
.ki-switch{width:44px;height:26px;background:var(--border2);border-radius:13px;position:relative;cursor:pointer;transition:background .2s;flex-shrink:0;border:none}
.ki-switch.on{background:var(--green)}
.ki-switch::after{content:'';position:absolute;width:20px;height:20px;background:#fff;border-radius:50%;top:3px;left:3px;transition:left .2s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.ki-switch.on::after{left:21px}
.ki-generate{width:100%;padding:15px;background:var(--green);color:#fff;border:none;border-radius:var(--r);font-family:'Playfair Display',serif;font-size:16px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;transition:opacity .15s}
.ki-generate:disabled{opacity:.5;cursor:default}
.ki-btn{background:var(--green);color:#fff;border:none;border-radius:var(--r2);padding:14px 18px;margin:0 16px 14px;display:flex;align-items:center;gap:12px;cursor:pointer;width:calc(100% - 32px);box-shadow:0 4px 14px rgba(44,95,61,.3)}
.ki-btn-icon{width:36px;height:36px;background:rgba(255,255,255,.15);border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:18px}
.ki-btn-title{font-family:'Playfair Display',serif;font-size:15px;font-weight:700;color:#fff;display:block;text-align:left}
.ki-btn-sub{font-size:12px;color:rgba(255,255,255,.7);margin-top:2px;display:block;text-align:left}
.ki-spinner{width:18px;height:18px;border:2px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
.ki-success{background:var(--green-light);border-radius:var(--r);padding:12px 16px;margin-bottom:16px;display:flex;align-items:center;gap:10px;font-size:13px;color:var(--green);font-weight:500}
</style>
</head>
<body>

  var logged=ST.tracker.length>0
    ?'<div class="logged-section"><h3>Heute geloggt</h3>'+ST.tracker.map(function(e,i){return '<div class="logged-item">'+av(e.r,32)+'<div style="flex:1"><div class="liname">'+e.r.name+'</div><div class="lisub">'+e.zeit+' · '+e.r.kcal+' kcal</div></div><button class="del-btn" onclick="rl('+i+')"><i class="ti ti-trash" style="font-size:16px" aria-hidden="true"></i></button></div>';}).join("")+'</div>'
    :'<div class="empty" style="padding:32px 0"><i class="ti ti-chart-bar" aria-hidden="true"></i><h3 style="font-size:15px">Noch nichts geloggt</h3><p>Trage deine erste Mahlzeit ein</p></div>';
  var dropdown=ST.offen?'<div class="log-dropdown">'+R.map(function(r,i){return '<button class="log-row" onclick="lm('+r.id+')" style="cursor:pointer">'+av(r,32)+'<div><div class="lrname">'+r.name+'</div><div class="lrsub">'+r.kcal+' kcal · Eiweiß '+r.protein+'g</div></div><i class="ti ti-plus" style="color:var(--text3);font-size:16px;margin-left:auto" aria-hidden="true"></i></button>';}).join("")+'</div>':"";
  return '<div class="tracker-summary"><h2>Heutige Bilanz</h2><div class="macro-grid" style="margin-bottom:14px">'+tiles.map(function(t){return '<div class="macro-tile"><div class="lbl">'+t[0]+'</div><div class="val">'+t[1]+'<span class="unit">'+t[2]+' <span style="font-size:11px;color:var(--text3)">'+t[3]+'</span></span></div></div>';}).join("")+'</div><div class="prog-bar-label"><span>Kalorienfortschritt</span><span>'+pct+'%</span></div><div class="prog-bar-track"><div class="prog-bar-fill" style="width:'+pct+'%;background:'+(pct>100?"var(--terra)":"var(--green)")+'"></div></div></div>'
    +'<button class="log-btn" onclick="to()"><span><i class="ti ti-plus" aria-hidden="true"></i>Mahlzeit eintragen</span><i class="ti ti-chevron-down" style="color:var(--text3);transition:transform .2s;transform:'+(ST.offen?"rotate(180deg)":"rotate(0)")+'" aria-hidden="true"></i></button>'
    +dropdown+logged;
}
function kiModal(){
  var k=ST.ki;
  var ausOpts=[
    {id:"fisch",label:"Kein Fisch"},
    {id:"vegetarisch",label:"Kein Fleisch"},
    {id:"vegan",label:"Nur Vegan"},
    {id:"high-protein",label:"Kein High-Protein"},
    {id:"deutsch",label:"Keine dt. Küche"},
    {id:"asiatisch",label:"Keine asiat. Küche"},
  ];
  var toggs=ausOpts.map(function(o){
    return '<button class="ki-tog'+(k.ausschluesse.includes(o.id)?" on":"")+'" onclick="kiTogAus(\''+o.id+'\')">'+o.label+'</button>';
  }).join("");
  var btnLabel=k.laden
    ?'<div class="ki-spinner"></div>Plan wird erstellt…'
    :'<i class="ti ti-sparkles" aria-hidden="true"></i>Wochenplan generieren';
  return '<div class="ki-overlay" onclick="kiOverlayClick(event)">'
    +'<div class="ki-sheet" id="ki-sheet">'
    +'<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px">'
    +'<div><div class="ki-title">KI-Wochenplan</div><div class="ki-sub">Gemini erstellt deinen persönlichen Plan</div></div>'
    +'<button onclick="closeKi()" style="background:var(--bg);border:none;border-radius:50%;width:32px;height:32px;cursor:pointer;font-size:18px;color:var(--text2);display:flex;align-items:center;justify-content:center"><i class="ti ti-x" aria-hidden="true"></i></button>'
    +'</div>'
    +(k.fehler?'<div style="background:#fef2f2;border-radius:var(--r);padding:12px 14px;margin-bottom:16px;font-size:13px;color:#b91c1c">'+k.fehler+'</div>':"")
    +'<label class="ki-label">Tägliches Kalorienziel</label>'
    +'<input type="range" class="ki-slider" min="1200" max="3500" step="50" value="'+k.kcal+'" oninput="kiKcal(this.value)">'
    +'<div class="ki-val">'+k.kcal+' kcal</div>'
    +'<label class="ki-label">Mahlzeiten pro Tag</label>'
    +'<div style="display:flex;gap:8px;margin-bottom:20px">'
    +[1,2,3,4].map(function(x){return '<button onclick="kiSetMahlzeiten('+x+')" style="flex:1;padding:10px 0;border-radius:var(--r);border:1.5px solid '+(k.mahlzeiten===x?"var(--green)":"var(--border)")+';background:'+(k.mahlzeiten===x?"var(--green-light)":"var(--card)")+';color:'+(k.mahlzeiten===x?"var(--green)":"var(--text2)")+';font-size:14px;font-weight:'+(k.mahlzeiten===x?"700":"500")+';cursor:pointer;font-family:\'Inter\',sans-serif">'+x+'x täglich</button>';}).join("")
    +'</div>'
    +'<label class="ki-label">Ausschlüsse</label>'
    +'<div class="ki-toggles">'+toggs+'</div>'
    +'<label class="ki-label">Besondere Wünsche</label>'
    +'<input type="text" class="ki-input" placeholder="z.B. viel Gemüse, wenig Pasta, schnelle Gerichte…" value="'+k.wuensche.replace(/"/g,'&quot;')+'" oninput="kiWunsch(this.value)">'
    +'<div class="ki-row">'
    +'<div><div style="font-size:14px;font-weight:500;color:var(--text)">Meal Prep bevorzugen</div><div style="font-size:12px;color:var(--text3);margin-top:2px">Rezepte wählen die sich vorkochen lassen</div></div>'
    +'<button class="ki-switch'+(k.mealprep?" on":"")+'" onclick="kiMealprep()"></button>'
    +'</div>'
    +'<button class="ki-generate" onclick="generateKi()" '+(k.laden?"disabled":"")+'>'+btnLabel+'</button>'
    +'</div></div>';
}

function render(){
  var c="";
  if(ST.detail)c=detail();
  else if(ST.picker)c=picker();
  else if(ST.seite==="rezepte")c=rezepte();
  else if(ST.seite==="planer")c=planer();
  else if(ST.seite==="einkaufen")c=einkaufen();
  else if(ST.seite==="tracker")c=tracker();
  var modal=ST.ki.offen?kiModal():"";
  document.getElementById("app").innerHTML=hdr()+tabs()+"<div>"+c+"</div>"+modal;
}

window.setSuche=function(v){ST.suche=v;render();};
window.resetFilter=function(){ST.filter=[];ST.suche="";render();};
window.sw=function(s){ST.seite=s;ST.detail=null;ST.picker=null;render();};
window.tf=function(f){ST.filter=ST.filter.includes(f)?ST.filter.filter(function(x){return x!==f;}):[...ST.filter,f];render();};
window.od=function(id){ST.detail=R.find(function(r){return r.id===id;});render();};
window.goBack=function(){ST.detail=null;ST.picker=null;render();};
window.tfd=function(){var r=ST.detail;ST.tracker=[...ST.tracker,{r:r,zeit:new Date().toLocaleTimeString("de-AT",{hour:"2-digit",minute:"2-digit"})}];ST.detail=null;ST.seite="tracker";render();};
window.op=function(tag,m){ST.picker={ptag:tag,mahlzeit:m};ST.ptag=tag;render();};
window.ap=function(id){ST.plan=Object.assign({},ST.plan,{[ST.ptag+"_"+ST.picker.mahlzeit]:id});ST.picker=null;render();};
window.rfp=function(tag,m){var n=Object.assign({},ST.plan);delete n[tag+"_"+m];ST.plan=n;render();};
window.spt=function(tag){ST.ptag=tag;render();};
window.ta=function(name){var n=new Set(ST.abhak);n.has(name)?n.delete(name):n.add(name);ST.abhak=n;render();};
window.to=function(){ST.offen=!ST.offen;render();};
window.lm=function(id){var r=R.find(function(x){return x.id===id;});if(r){ST.tracker=[...ST.tracker,{r:r,zeit:new Date().toLocaleTimeString("de-AT",{hour:"2-digit",minute:"2-digit"})}];ST.offen=false;render();}};
window.rl=function(i){ST.tracker=ST.tracker.filter(function(_,j){return j!==i;});render();};

// KI Modal handlers
window.setMahlzeiten=function(n){ST.mahlzeiten=n;ST.ki.mahlzeiten=n;ST.plan={};render();};
window.openKi=function(){ST.ki.offen=true;ST.ki.fehler="";render();};
window.closeKi=function(){ST.ki.offen=false;render();};
window.kiOverlayClick=function(e){if(e.target.classList.contains("ki-overlay"))window.closeKi();};
window.kiKcal=function(v){ST.ki.kcal=parseInt(v);render();};
window.kiWunsch=function(v){ST.ki.wuensche=v;};
window.kiMealprep=function(){ST.ki.mealprep=!ST.ki.mealprep;render();};
window.kiSetMahlzeiten=function(n){ST.ki.mahlzeiten=n;render();};
window.kiTogAus=function(id){
  var a=ST.ki.ausschluesse;
  ST.ki.ausschluesse=a.includes(id)?a.filter(function(x){return x!==id;}):[...a,id];
  render();
};

window.generateKi=async function(){
  ST.ki.laden=true;ST.ki.fehler="";render();
  try{
    var kompakt=R.map(function(r){return{id:r.id,name:r.name,tags:r.tags,kcal:r.kcal,min:r.min};});
    var kiMl=ML_MAP[ST.ki.mahlzeiten]||ML_MAP[3];
    var res=await fetch("/api/menuplan",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        kcal:ST.ki.kcal,
        mahlzeiten:kiMl,
        ausschluesse:ST.ki.ausschluesse,
        mealprep:ST.ki.mealprep,
        wuensche:ST.ki.wuensche,
        rezepte:kompakt
      })
    });
    var data=await res.json();
    if(!res.ok||data.error)throw new Error(data.error||"Unbekannter Fehler");
    var plan=data.plan;
    var neuerPlan={};
    ["Mo","Di","Mi","Do","Fr","Sa","So"].forEach(function(tag){
      kiMl.forEach(function(m){
        if(plan[tag]&&plan[tag][m])neuerPlan[tag+"_"+m]=plan[tag][m];
      });
    });
    ST.plan=neuerPlan;
    ST.mahlzeiten=ST.ki.mahlzeiten;
    ST.ki.offen=false;
    ST.ki.laden=false;
    ST.seite="planer";
    ST.ptag="Mo";
    render();
  }catch(e){
    ST.ki.laden=false;
    ST.ki.fehler="Fehler: "+e.message+". Bitte prüfe den API-Key in den Vercel-Einstellungen.";
    render();
  }
};

render();
</script>


</body></html>
